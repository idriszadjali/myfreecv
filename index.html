<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Free CV Maker</title>
<meta name="description" content="Build a clean, ATS-friendly CV in your browser and export a real-text A4 PDF. Free, no sign-up.">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='7' fill='%234f46e5'/%3E%3Crect x='8' y='8.5' width='16' height='3' rx='1.5' fill='%23fff'/%3E%3Crect x='8' y='15' width='16' height='2.2' rx='1.1' fill='%23ffffff' opacity='.8'/%3E%3Crect x='8' y='19.5' width='16' height='2.2' rx='1.1' fill='%23ffffff' opacity='.8'/%3E%3Crect x='8' y='24' width='9' height='2.2' rx='1.1' fill='%23ffffff' opacity='.55'/%3E%3C/svg%3E">

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
  :root{
    --bg:#f1f2f4;
    --panel:#ffffff;
    --ink:#15171c;
    --ink-2:#3c414b;
    --muted:#6b7280;
    --faint:#9aa1ab;
    --line:#e6e8ec;
    --line-2:#f0f1f4;
    --field:#d8dbe1;
    --accent:#4f46e5;
    --accent-2:#4338ca;
    --accent-tint:#eef0fe;
    --danger:#c0392b;
    --radius:16px;
    --radius-sm:11px;
    --shadow-sm:0 1px 2px rgba(20,22,28,.05);
    --shadow:0 1px 2px rgba(20,22,28,.04),0 14px 34px -12px rgba(20,22,28,.16);
  }
  *{box-sizing:border-box}
  html,body{margin:0}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    color:var(--ink);background:var(--bg);line-height:1.5;
    -webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility;
  }
  a{color:var(--accent);text-decoration:none}
  a:hover{text-decoration:underline}
  ::selection{background:var(--accent-tint);color:var(--accent-2)}
  :focus-visible{outline:2px solid var(--accent);outline-offset:2px}

  header.top{
    position:sticky;top:0;z-index:20;
    background:rgba(247,248,250,.82);backdrop-filter:saturate(180%) blur(10px);
    -webkit-backdrop-filter:saturate(180%) blur(10px);
    border-bottom:1px solid var(--line);
  }
  .top-inner{max-width:1180px;margin:0 auto;padding:9px 18px;display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:10px}
  .burger{grid-column:3;justify-self:end;display:inline-flex;align-items:center;justify-content:center;width:38px;height:38px;border:1px solid var(--line);background:#fff;color:var(--ink);border-radius:10px;cursor:pointer;box-shadow:var(--shadow-sm);transition:background .12s,border-color .12s}
  .burger:hover{background:#f7f8fa;border-color:var(--field)}
  .burger:active{transform:translateY(1px)}
  .counter{grid-column:2;justify-self:center;position:relative;display:inline-flex;align-items:baseline;gap:6px;font-size:13px;color:var(--muted)}
  .counter.hidden{display:none}
  .counter .num{font-weight:700;font-size:13.5px;color:var(--ink);font-variant-numeric:tabular-nums;letter-spacing:.2px}
  .counter.bumped .num{animation:numGlow .9s ease}
  .plus-one{
    position:absolute;left:100%;top:-5px;margin-left:5px;
    color:var(--accent);font-weight:700;font-size:11px;pointer-events:none;white-space:nowrap;
    animation:floatUp 1s ease-out forwards;
  }
  @keyframes numGlow{0%{color:var(--accent)}100%{color:var(--ink)}}
  @keyframes floatUp{0%{opacity:0;transform:translateY(4px)}30%{opacity:1}100%{opacity:0;transform:translateY(-11px)}}
  @media (prefers-reduced-motion:reduce){
    .counter.bumped .num{animation:none}
    .plus-one{display:none}
  }

  .wrap{max-width:860px;margin:0 auto;padding:26px 20px 16px}
  .form-foot{padding:18px 22px 22px;border-top:1px solid var(--line-2);display:flex;align-items:center;justify-content:center;gap:14px;flex-wrap:wrap}
  .form-foot .btn-export{font-size:15px;padding:12px 22px}
  .export-status{font-size:12.5px;color:var(--muted)}

  .panel{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow)}

  .form-head{padding:20px 22px;border-bottom:1px solid var(--line-2);display:flex;align-items:flex-start;justify-content:space-between;gap:14px;flex-wrap:wrap}
  .form-head h1{font-size:18px;font-weight:650;letter-spacing:-.2px;margin:0;color:var(--ink)}
  .form-body{padding:2px 22px 20px}

  .sec{border-top:1px solid var(--line-2);padding:20px 0}
  .sec:first-child{border-top:none}
  .sec h2{font-size:11.5px;text-transform:uppercase;letter-spacing:.9px;color:var(--faint);font-weight:700;margin:0}
  .sec-hd{display:flex;align-items:center;justify-content:space-between;gap:10px;margin:0 0 14px}
  .sec-mv{display:flex;gap:3px}
  .mv{width:27px;height:27px;display:inline-flex;align-items:center;justify-content:center;padding:0;border:1px solid var(--line);background:#fff;color:var(--muted);border-radius:7px;cursor:pointer;font-size:9px;line-height:1;transition:background .12s,border-color .12s,color .12s}
  .mv:hover:not(:disabled){border-color:var(--field);color:var(--ink-2);background:#f7f8fa}
  .mv:disabled{opacity:.35;cursor:default}
  .ent-ctl{display:flex;align-items:center;gap:5px}
  .field select{font:inherit;font-size:14px;color:var(--ink);background:#fff;border:1px solid var(--field);border-radius:10px;padding:10px 12px;width:100%;cursor:pointer;transition:border-color .15s,box-shadow .15s}
  .field select:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px rgba(79,70,229,.14)}

  .row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  @media (max-width:520px){ .row{grid-template-columns:1fr} }
  .field{display:flex;flex-direction:column;gap:6px;margin-bottom:12px}
  .field.full{grid-column:1/-1}
  label{font-size:12.5px;font-weight:600;color:var(--ink-2)}
  label .opt{font-weight:500;color:var(--faint)}
  input[type=text],input[type=email],input[type=tel],input[type=url],textarea{
    font:inherit;font-size:14px;color:var(--ink);background:#fff;
    border:1px solid var(--field);border-radius:10px;padding:10px 12px;width:100%;
    transition:border-color .15s,box-shadow .15s;
  }
  input::placeholder,textarea::placeholder{color:#b1b6bf}
  input:focus,textarea:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px rgba(79,70,229,.14)}
  textarea{resize:none;overflow:hidden;min-height:78px;line-height:1.55}
  .hint{font-size:11.5px;color:var(--muted);line-height:1.5}

  .entry{border:1px solid var(--line);border-radius:var(--radius-sm);padding:15px;margin-bottom:12px;background:#fcfcfd}
  .entry .entry-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
  .entry .entry-top .etitle{font-size:11px;font-weight:700;color:var(--faint);text-transform:uppercase;letter-spacing:.7px}

  .btn{
    font:inherit;font-weight:600;font-size:13.5px;cursor:pointer;border-radius:10px;white-space:nowrap;
    border:1px solid transparent;padding:9px 15px;
    transition:background .15s,border-color .15s,color .15s,box-shadow .15s,transform .04s;
  }
  .btn:active{transform:translateY(1px)}
  .btn-primary{background:var(--ink);color:#fff;box-shadow:0 1px 2px rgba(20,22,28,.22),0 8px 18px -8px rgba(20,22,28,.5)}
  .btn-primary:hover{background:#282b33}
  .btn-secondary{background:#fff;color:var(--ink-2);border-color:var(--field)}
  .btn-secondary:hover{background:#f7f8fa;border-color:#c8cdd6}
  .btn-ghost{background:transparent;color:var(--muted);border-color:transparent;padding:7px 11px;font-size:12.5px}
  .btn-ghost:hover{color:var(--danger);background:#fcf2f1}
  .btn-add{width:100%;background:transparent;color:var(--accent-2);border:1px dashed #cdd1e6;font-weight:600;padding:11px;margin-top:2px}
  .btn-add:hover{background:var(--accent-tint);border-color:var(--accent)}

  .toolbar{display:flex;gap:8px;flex-wrap:wrap}
  .check{display:inline-flex;align-items:center;gap:9px;font-size:13.5px;color:var(--ink-2);cursor:pointer;user-select:none}
  .check input{width:17px;height:17px;accent-color:var(--accent);cursor:pointer}
  .photo-row{display:flex;flex-direction:column;align-items:flex-start;gap:12px}
  .photo-crop{display:flex;flex-direction:column;gap:8px}
  .crop-canvas{width:190px;height:190px;border-radius:12px;border:1px solid var(--line);background:#eef0f4;cursor:move;touch-action:none;box-shadow:var(--shadow-sm)}
  .crop-zoom{width:190px;accent-color:var(--accent);cursor:pointer}

  .tel{position:relative;display:flex;align-items:stretch;border:1px solid var(--field);border-radius:10px;background:#fff;transition:border-color .15s,box-shadow .15s}
  .tel:focus-within{border-color:var(--accent);box-shadow:0 0 0 3px rgba(79,70,229,.14)}
  .tel-btn{display:flex;align-items:center;gap:6px;padding:0 11px;font:inherit;font-size:14px;background:transparent;border:0;border-right:1px solid var(--line);border-radius:10px 0 0 10px;cursor:pointer;color:var(--ink);white-space:nowrap}
  .tel-btn:hover{background:#f7f8fa}
  .tel-btn .flag{font-size:15px;line-height:1}
  .tel-btn .dc{font-variant-numeric:tabular-nums;font-weight:600}
  .tel-btn .caret{color:var(--faint);font-size:10px}
  .tel .tel-input{border:0;border-radius:0 10px 10px 0;background:transparent;flex:1;min-width:0}
  .tel .tel-input:focus{box-shadow:none}
  .tel-pop{position:absolute;top:calc(100% + 6px);left:0;z-index:40;width:min(330px,92vw);background:#fff;border:1px solid var(--line);border-radius:12px;box-shadow:var(--shadow);padding:8px;display:none}
  .tel-pop.open{display:block}
  .tel-search{width:100%;font:inherit;font-size:13.5px;padding:8px 10px;border:1px solid var(--field);border-radius:8px;margin-bottom:6px;color:var(--ink)}
  .tel-search:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px rgba(79,70,229,.14)}
  .tel-list{list-style:none;margin:0;padding:0;max-height:236px;overflow:auto}
  .tel-list li{display:flex;align-items:center;gap:10px;padding:8px 9px;border-radius:7px;cursor:pointer;font-size:13.5px}
  .tel-list li:hover,.tel-list li.active{background:var(--accent-tint)}
  .tel-list li .flag{font-size:15px;width:22px;text-align:center;line-height:1}
  .tel-list li .nm{flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--ink)}
  .tel-list li .dc{color:var(--muted);font-variant-numeric:tabular-nums}
  .tel-list .empty{padding:12px;text-align:center;color:var(--muted);font-size:13px}

  .combo{position:relative}
  .combo-btn{display:flex;align-items:center;justify-content:space-between;gap:8px;width:100%;font:inherit;font-size:14px;color:var(--ink);background:#fff;border:1px solid var(--field);border-radius:10px;padding:10px 12px;cursor:pointer;text-align:left;transition:border-color .15s,box-shadow .15s}
  .combo-btn:hover{border-color:#c8cdd6}
  .combo.open .combo-btn{border-color:var(--accent);box-shadow:0 0 0 3px rgba(79,70,229,.14)}
  .combo-btn .ph{color:#b1b6bf}
  .combo-btn .caret{color:var(--faint);font-size:10px;flex:none}
  .combo-pop{width:100%}

  .plabel{display:inline-flex;align-items:center;gap:9px;font-size:12px;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:.9px}
  .tag{font-size:10px;font-weight:700;letter-spacing:.5px;color:var(--ink-2);background:#fff;border:1px solid var(--line);padding:2px 7px;border-radius:6px;box-shadow:var(--shadow-sm)}
  .btn-export{padding:10px 18px;font-size:14px;display:inline-flex;align-items:center}
  .btn-export svg{margin-right:7px}

  .drawer-overlay{position:fixed;inset:0;z-index:60;background:rgba(15,17,22,.45);display:flex;justify-content:flex-end;opacity:0;transition:opacity .22s}
  .drawer-overlay.open{opacity:1}
  .drawer-overlay[hidden]{display:none}
  .drawer{width:min(580px,100%);height:100%;background:#eef0f3;display:flex;flex-direction:column;box-shadow:-8px 0 30px rgba(15,17,22,.22);transform:translateX(100%);transition:transform .26s ease}
  .drawer-overlay.open .drawer{transform:translateX(0)}
  .drawer-head{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:13px 16px;background:#fff;border-bottom:1px solid var(--line)}
  .drawer-actions{display:flex;align-items:center;gap:10px}
  .drawer-close{width:34px;height:34px;flex:none;display:inline-flex;align-items:center;justify-content:center;border:1px solid var(--line);background:#fff;color:var(--muted);border-radius:9px;cursor:pointer;font-size:20px;line-height:1}
  .drawer-close:hover{background:#f7f8fa;color:var(--ink)}

  .paper-scroll{overflow:auto;background:#e4e6ea;padding:20px;box-shadow:inset 0 1px 4px rgba(20,22,28,.09)}
  .drawer .paper-scroll{flex:1;min-height:0}
  .paper-scroll::-webkit-scrollbar{width:11px;height:11px}
  .paper-scroll::-webkit-scrollbar-thumb{background:#c3c7d0;border-radius:7px;border:3px solid #e4e6ea}
  .paper-scroll::-webkit-scrollbar-thumb:hover{background:#adb2bd}

  .nudge-overlay{position:fixed;inset:0;z-index:80;background:rgba(15,17,22,.45);display:flex;align-items:center;justify-content:center;padding:20px}
  .nudge-overlay[hidden]{display:none}
  .nudge-card{position:relative;background:#fff;border:1px solid var(--line);border-radius:16px;box-shadow:0 20px 50px -12px rgba(15,17,22,.35);max-width:340px;width:100%;padding:48px 24px 24px;text-align:center}
  .nudge-close{position:absolute;top:10px;right:10px;width:30px;height:30px;display:inline-flex;align-items:center;justify-content:center;border:0;background:transparent;color:var(--faint);border-radius:8px;cursor:pointer;font-size:20px;line-height:1}
  .nudge-close:hover{background:#f2f3f5;color:var(--ink)}
  .nudge-title{font-size:17px;font-weight:650;letter-spacing:-.2px;margin:0 0 6px;color:var(--ink)}
  .nudge-text{font-size:13.5px;color:var(--muted);margin:0 0 18px;line-height:1.5}
  .nudge-download{width:100%;display:inline-flex;align-items:center;justify-content:center;gap:8px;font-size:15px;padding:12px 18px}
  .popup-status{display:block;font-size:12px;color:var(--muted);min-height:15px;margin-top:8px}
  .nudge-divider{height:1px;background:var(--line);margin:16px 0 15px}
  .nudge-btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;background:#0a66c2;color:#fff;text-decoration:none;padding:10px 22px;box-shadow:0 1px 2px rgba(10,102,194,.25),0 8px 18px -8px rgba(10,102,194,.55)}
  .nudge-btn:hover{background:#004182;text-decoration:none}

  .cv-page{
    width:794px;max-width:100%;margin:0 auto;background:#fff;color:#1a1a1a;
    box-shadow:0 1px 2px rgba(20,22,28,.10),0 18px 44px -16px rgba(20,22,28,.32);
    font-family:"Helvetica Neue",Helvetica,Arial,sans-serif;line-height:1.42;
    padding:60px 64px;min-height:1123px;border-radius:3px;
  }
  @media (max-width:900px){ .cv-page{padding:34px 30px;min-height:0} }

  .cv-head{display:flex;gap:20px;align-items:flex-start;margin-bottom:2px}
  .cv-head .cv-photo{width:92px;height:92px;border-radius:6px;object-fit:cover;flex:none;border:1px solid #e2e2e2}
  .cv-name{font-size:28px;font-weight:700;letter-spacing:-.4px;margin:0;color:#141414;line-height:1.1}
  .cv-headline{font-size:14px;color:#4a4f57;margin:5px 0 0;font-weight:500}
  .cv-contact{font-size:11.5px;color:#5a5f66;margin-top:9px;line-height:1.7;overflow-wrap:anywhere}
  .cv-contact span:not(:last-child)::after{content:"  ·  ";color:#c2c2c2}

  .cv-sec{margin-top:22px}
  .cv-sec h3{
    font-size:11.5px;font-weight:700;text-transform:uppercase;letter-spacing:1.4px;color:#1a1a1a;
    margin:0 0 10px;padding-bottom:6px;border-bottom:1px solid #d9dade;
  }
  .cv-summary{font-size:12.5px;color:#33373d;margin:0;line-height:1.6}

  .cv-item{margin-bottom:14px}
  .cv-item:last-child{margin-bottom:0}
  .cv-item .line1{display:flex;justify-content:space-between;gap:12px;align-items:baseline}
  .cv-item .role{font-size:13px;font-weight:700;color:#17181c}
  .cv-item .dates{font-size:11px;color:#6a6f77;white-space:nowrap;flex:none;font-variant-numeric:tabular-nums}
  .cv-item .org{font-size:12px;color:#2f4b86;font-weight:600;margin-top:2px}
  .cv-item .org .oloc{color:#71767e;font-weight:500}
  .cv-item .org .oloc::before{content:"|";margin:0 7px;color:#c2c2c2}
  .cv-item .org .olink{color:#71767e;font-weight:500}
  .cv-item ul{margin:6px 0 0;padding-left:17px}
  .cv-item li{font-size:11.8px;color:#33373d;margin-bottom:3px;line-height:1.5}
  .cv-item .details{font-size:11.8px;color:#33373d;margin-top:3px;line-height:1.5}
  .cv-skills{font-size:12.3px;color:#33373d;line-height:1.7}
  .cv-empty{color:#c4c7cd}

  footer.credit{max-width:1180px;margin:14px auto 40px;padding:22px 24px 0;border-top:1px solid var(--line);text-align:center;line-height:1.6}
  footer.credit .by{display:block;font-size:12.5px;color:var(--faint)}
  footer.credit .by b{color:var(--ink-2);font-weight:600}
  footer.credit .li{display:inline-flex;align-items:center;gap:6px;margin-top:7px;font-size:12.5px;font-weight:600;color:#0a66c2}
  footer.credit .li:hover{text-decoration:underline}

  .sr-only{position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);border:0}

  @media (max-width:600px){
    input[type=text],input[type=email],input[type=tel],input[type=url],textarea,.field select,.tel-search,.tel-btn,.combo-btn{font-size:16px}
    .mv{width:36px;height:36px;font-size:11px}
  }
</style>

<header class="top" id="topBar">
  <div class="top-inner">
    <div class="counter hidden" id="counter" title="CVs created with this tool so far">
      <b class="num" id="counterNum">0</b>
      <span class="cap">CVs created</span>
    </div>
    <button class="burger" id="burgerBtn" type="button" aria-label="Open preview and export">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" aria-hidden="true"><path d="M4 7h16M4 12h16M4 17h16"/></svg>
    </button>
  </div>
</header>

<div class="wrap">
  <section class="panel" aria-label="CV details form">
    <div class="form-head">
      <div>
        <h1>Your details</h1>
      </div>
      <div class="toolbar">
        <button class="btn btn-ghost" id="clearBtn" type="button">Clear all</button>
      </div>
    </div>
    <div class="form-body" id="formBody"></div>
    <div class="form-foot">
      <button class="btn btn-primary btn-export js-export" type="button">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M12 3v11m0 0l4-4m-4 4l-4-4M4 21h16"/></svg>Export PDF
      </button>
      <span class="export-status" aria-live="polite"></span>
    </div>
  </section>
</div>

<div class="drawer-overlay" id="drawerOverlay" hidden>
  <aside class="drawer" id="drawer" aria-label="CV preview">
    <div class="drawer-head">
      <span class="plabel">Preview <span class="tag">A4</span></span>
      <div class="drawer-actions">
        <span class="export-status" aria-live="polite"></span>
        <button class="btn btn-primary btn-export js-export" type="button">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M12 3v11m0 0l4-4m-4 4l-4-4M4 21h16"/></svg>Export PDF
        </button>
        <button class="drawer-close" id="drawerClose" type="button" aria-label="Close preview">&times;</button>
      </div>
    </div>
    <div class="paper-scroll">
      <div class="cv-page" id="cvPage"></div>
    </div>
  </aside>
</div>

<footer class="credit">

      if(done) return;

      var t = Math.min(1, (now-start)/dur);
      var eased = 1 - Math.pow(1-t, 3);
      renderNum(Math.round(from + (to-from)*eased));
      if(t<1) requestAnimationFrame(frame); else { done = true; renderNum(to); }

    requestAnimationFrame(frame);
    setTimeout(function(){ if(!done){ done = true; renderNum(to); } }, dur + 150);
  }

    function doFilter(q){

  var PHOTO_MAX = 800, PHOTO_OUT = 300, CROP_D = 190;
  function loadImg(src){ return new Promise(function(resolve, reject){ var im = new Image(); im.onload = function(){ resolve(im); }; im.onerror = reject; im.src = src; }); }
  function downscaleImg(img, max){
    var iw=img.naturalWidth, ih=img.naturalHeight, s=Math.min(1, max/Math.max(iw,ih));
    var w=Math.max(1,Math.round(iw*s)), h=Math.max(1,Math.round(ih*s));
    var c=document.createElement("canvas"); c.width=w; c.height=h;
    c.getContext("2d").drawImage(img,0,0,w,h);
    return c.toDataURL("image/jpeg",0.9);
  }
  function computeCropDraw(img, D, crop){
    var iw=img.naturalWidth, ih=img.naturalHeight;
    var eff = (D/Math.min(iw,ih)) * (crop.z||1);
    var dw=iw*eff, dh=ih*eff;
    var maxX=Math.max(0,(dw-D)/2), maxY=Math.max(0,(dh-D)/2);
    crop.ox=Math.max(-maxX,Math.min(maxX,crop.ox||0));
    crop.oy=Math.max(-maxY,Math.min(maxY,crop.oy||0));
    return {dw:dw,dh:dh,dx:(D-dw)/2+crop.ox,dy:(D-dh)/2+crop.oy};
  }
  function renderCropped(img, crop){
    var k=PHOTO_OUT/CROP_D, c=document.createElement("canvas"); c.width=PHOTO_OUT; c.height=PHOTO_OUT;
    var d=computeCropDraw(img, CROP_D, crop), ctx=c.getContext("2d");
    ctx.drawImage(img, d.dx*k, d.dy*k, d.dw*k, d.dh*k);
    return c.toDataURL("image/jpeg",0.92);
  }
  function buildPhotoCropper(){
    var wrap = el("div",{class:"photo-crop"});
    var canvas = el("canvas",{class:"crop-canvas", width:CROP_D, height:CROP_D});
    var zoom = el("input",{type:"range", class:"crop-zoom", min:"1", max:"3", step:"0.01", value:String(state.photoCrop.z||1), "aria-label":"Zoom photo"});
    wrap.appendChild(canvas); wrap.appendChild(zoom);
    var img=null;
    function draw(){ if(!img) return; var ctx=canvas.getContext("2d"); ctx.clearRect(0,0,CROP_D,CROP_D); var d=computeCropDraw(img,CROP_D,state.photoCrop); ctx.drawImage(img,d.dx,d.dy,d.dw,d.dh); }
    function commit(){ if(!img) return; state.photo = renderCropped(img, state.photoCrop); renderPreview(); }
    loadImg(state.photoSrc).then(function(im){ img=im; draw(); });
    var dragging=false, lastX=0, lastY=0;
    canvas.addEventListener("pointerdown", function(e){ dragging=true; lastX=e.clientX; lastY=e.clientY; try{ canvas.setPointerCapture(e.pointerId); }catch(_){} });
    canvas.addEventListener("pointermove", function(e){ if(!dragging) return; state.photoCrop.ox += (e.clientX-lastX); state.photoCrop.oy += (e.clientY-lastY); lastX=e.clientX; lastY=e.clientY; draw(); });
    function endDrag(){ if(!dragging) return; dragging=false; commit(); }
    canvas.addEventListener("pointerup", endDrag);
    canvas.addEventListener("pointercancel", endDrag);
    zoom.addEventListener("input", function(){ state.photoCrop.z = parseFloat(zoom.value); draw(); });
    zoom.addEventListener("change", commit);
    return wrap;
  }

    var items = state.languages.filter(hasLang); if(!items.length) return "";
    var parts = items.map(function(l){ return esc(l.name.trim()) + (l.level ? ' <span class="oloc">('+esc(l.level)+')</span>' : ""); });
    return sectionOpen("Languages")+'<div class="cv-skills">'+parts.join("  ·  ")+'</div></div>';
  }
  var PREVIEW_BUILDERS = {
    experience: previewExperience, education: previewEducation, projects: previewProjects,
    skills: previewSkills, certifications: previewCertifications, languages: previewLanguages
  };
  function renderPreview(){
    var h = previewHeader() + previewSummary();
    state.sectionOrder.forEach(function(key){ var b = PREVIEW_BUILDERS[key]; if(b) h += b(); });
    cvPage.innerHTML = h;
    saveState();
  }
  function sectionOpen(title){ return '<div class="cv-sec"><h3>'+esc(title)+'</h3>'; }
  function hasExp(it){ return it.role.trim()||it.org.trim()||bulletLines(it.bullets).length; }
  function hasEdu(it){ return it.degree.trim()||it.school.trim()||it.details.trim(); }
  function hasProj(it){ return it.name.trim()||bulletLines(it.bullets).length; }
  function hasCert(it){ return (it.name&&it.name.trim())||(it.issuer&&it.issuer.trim()); }
  function hasLang(it){ return it.name&&it.name.trim(); }
  function skillList(){ return String(state.skills||"").split(/[\n,]+/).map(function(s){return s.replace(/^[•\-\*]\s*/,"").trim();}).filter(Boolean); }

  function exportPDF(){
    var jsPDFCtor = window.jspdf && window.jspdf.jsPDF;
    if(!jsPDFCtor){ setPopupStatus("PDF library didn't load. Check your connection and retry.", true); return null; }

    var doc = new jsPDFCtor({unit:"pt", format:"a4", compress:true});
    var PAGE_W = doc.internal.pageSize.getWidth();
    var PAGE_H = doc.internal.pageSize.getHeight();
    var M = 45;
    var CW = PAGE_W - M*2;
    var INK=[26,26,26], MUTE=[85,85,85], ACC=[47,87,166], RULE=[51,51,51];
    var y = M;

    function need(hgt){ if(y+hgt > PAGE_H - M){ doc.addPage(); y = M; } }
    function setFont(style, size, color){
      doc.setFont("helvetica", style); doc.setFontSize(size);
      doc.setTextColor(color[0],color[1],color[2]);
    }
    function para(text, x, size, style, color, lineH, maxW){
      if(!text) return;
      setFont(style,size,color);
      var wrapped = doc.splitTextToSize(String(text), maxW);
      for(var i=0;i<wrapped.length;i++){ need(lineH); doc.text(wrapped[i], x, y); y+=lineH; }
    }

    var photoW = 0;
    if(state.photoEnabled && state.photo){
      var pw=70, ph=70;
      try{
        var fmt = /^data:image\/png/i.test(state.photo) ? "PNG" : "JPEG";
        doc.addImage(state.photo, fmt, PAGE_W - M - pw, y, pw, ph);
        photoW = pw + 14;
      }catch(e){}
    }
    var headW = CW - photoW;

    setFont("bold", 22, INK);
    var nameLines = doc.splitTextToSize(state.name.trim()||"Your Name", headW);
    for(var i=0;i<nameLines.length;i++){ need(26); doc.text(nameLines[i], M, y+16); y+=26; }
    y += 2;
    if(state.headline.trim()){ para(state.headline, M, 11.5, "normal", [51,51,68], 15, headW); y+=1; }
    var citems = contactItems();
    if(citems.length){
      var csize=9.5, clineH=13, csep="   ·   ";
      setFont("normal", csize, MUTE);
      var csepW = doc.getTextWidth(csep), clx = M;
      need(clineH);
      for(var ci=0; ci<citems.length; ci++){
        var cit = citems[ci];
        setFont("normal", csize, MUTE);
        var cw = doc.getTextWidth(cit.text);
        var sepW = (clx > M) ? csepW : 0;
        if(sepW && (clx - M) + sepW + cw > headW){ y += clineH; need(clineH); clx = M; sepW = 0; }
        if(sepW){ doc.text(csep, clx, y); clx += sepW; }
        if(cit.url){ doc.textWithLink(cit.text, clx, y, {url:cit.url}); } else { doc.text(cit.text, clx, y); }
        clx += cw;
      }
      y += clineH;
    }
    if(photoW && y < M + 70 + 4){ y = M + 70 + 4; }
    y += 8;

    function sectionHeading(title){
      need(26);
      y += 4;
      setFont("bold", 11, INK);
      doc.text(String(title).toUpperCase(), M, y, {charSpace:1});
      y += 5;
      doc.setDrawColor(RULE[0],RULE[1],RULE[2]); doc.setLineWidth(1.1);
      doc.line(M, y, PAGE_W - M, y);
      y += 12;
    }
    function titleDates(title, dates, size){
      need(size+4);
      var dW = 0;
      if(dates && dates.trim()){ setFont("normal", 9.5, MUTE); dW = doc.getTextWidth(dates) + 8; }
      setFont("bold", size, INK);
      var tLines = doc.splitTextToSize(title, CW - dW);
      doc.text(tLines[0], M, y);
      if(dates && dates.trim()){ setFont("normal", 9.5, MUTE); doc.text(dates, PAGE_W - M, y, {align:"right"}); }
      y += (size+3);
      for(var i=1;i<tLines.length;i++){ need(size+3); setFont("bold",size,INK); doc.text(tLines[i], M, y); y+=(size+3); }
    }
    function subLine(text, color){
      if(!text || !text.trim()) return;
      para(text, M, 10, "normal", color||ACC, 13, CW);
    }
    function bullets(list){
      list.forEach(function(b){
        setFont("normal", 9.5, [43,43,43]);
        var wrapped = doc.splitTextToSize(b, CW - 12);
        for(var i=0;i<wrapped.length;i++){
          need(12.5);
          if(i===0){ doc.text("•", M+2, y); }
          doc.text(wrapped[i], M+12, y);
          y += 12.5;
        }
      });
    }

    if(state.summary.trim()){
      sectionHeading("Summary");
      para(state.summary, M, 10, "normal", [43,43,43], 13.5, CW);
    }

    var PDF = {
      experience: function(){
        var items = state.experience.filter(hasExp); if(!items.length) return;
        sectionHeading("Experience");
        items.forEach(function(it, idx){
          titleDates(it.role.trim(), it.dates.trim(), 10.5);
          var org = it.org.trim() + (it.loc.trim()? "   |   "+it.loc.trim() : "");
          subLine(org, ACC);
          var bl = bulletLines(it.bullets); if(bl.length){ y+=1; bullets(bl); }
          if(idx<items.length-1) y += 6;
        });
      },
      education: function(){
        var items = state.education.filter(hasEdu); if(!items.length) return;
        sectionHeading("Education");
        items.forEach(function(it, idx){
          titleDates(it.degree.trim(), it.dates.trim(), 10.5);
          var sch = it.school.trim() + (it.loc.trim()? "   |   "+it.loc.trim() : "");
          subLine(sch, ACC);
          if(it.details.trim()){ para(it.details, M, 9.5, "normal", [43,43,43], 12.5, CW); }
          if(idx<items.length-1) y += 6;
        });
      },
      projects: function(){
        var items = state.projects.filter(hasProj); if(!items.length) return;
        sectionHeading("Projects");
        items.forEach(function(it, idx){
          titleDates(it.name.trim(), it.dates.trim(), 10.5);
          if(it.link.trim()){
            var lk = it.link.trim();
            setFont("normal", 10, MUTE);
            var lw = doc.splitTextToSize(lk, CW);
            for(var li=0; li<lw.length; li++){ need(13); doc.textWithLink(lw[li], M, y, {url:normUrl(lk)}); y+=13; }
          }
          var bl = bulletLines(it.bullets); if(bl.length){ y+=1; bullets(bl); }
          if(idx<items.length-1) y += 6;
        });
      },
      certifications: function(){
        var items = state.certifications.filter(hasCert); if(!items.length) return;
        sectionHeading("Certifications");
        items.forEach(function(it, idx){
          titleDates((it.name||"").trim(), (it.date||"").trim(), 10.5);
          if(it.issuer && it.issuer.trim()) subLine(it.issuer.trim(), ACC);
          if(idx<items.length-1) y += 6;
        });
      },
      skills: function(){
        var sk = skillList(); if(!sk.length) return;
        sectionHeading("Skills");
        bullets(sk);
      },
      languages: function(){
        var items = state.languages.filter(hasLang); if(!items.length) return;
        sectionHeading("Languages");
        var parts = items.map(function(l){ return l.name.trim() + (l.level ? " ("+l.level+")" : ""); });
        para(parts.join("   ·   "), M, 10, "normal", [43,43,43], 14, CW);
      }
    };
    state.sectionOrder.forEach(function(key){ if(PDF[key]) PDF[key](); });

    return doc;
  }

  function safeName(){
    var base = (state.name.trim()||"CV").replace(/[^\w؀-ۿ -]+/g,"").replace(/\s+/g,"_");
    return base + "_CV.pdf";
  }

  var exportBtns = document.querySelectorAll(".js-export");
  var statusEls = document.querySelectorAll(".export-status");
  function setStatus(msg, isErr){ statusEls.forEach(function(s){ s.textContent = msg||""; s.style.color = isErr ? "#c0392b" : "var(--muted)"; }); }

  var nudgeOverlay = document.getElementById("nudgeOverlay");
  var nudgeClose = document.getElementById("nudgeClose");
  var nudgeLink = document.getElementById("nudgeLink");
  var popupDownloadBtn = document.getElementById("popupDownload");
  var popupStatusEl = document.getElementById("popupStatus");
  var footerLi = document.querySelector("footer.credit .li");
  if(footerLi && nudgeLink) nudgeLink.setAttribute("href", footerLi.getAttribute("href"));

  function setPopupStatus(msg, isErr){ popupStatusEl.textContent = msg||""; popupStatusEl.style.color = isErr ? "#c0392b" : "var(--muted)"; }
  function openExportPopup(){
    if(!state.name.trim() && !state.experience.filter(hasExp).length && !state.education.filter(hasEdu).length){
      setStatus("Add your name and some details first.", true); return;
    }
    setStatus("");
    setPopupStatus("");
    nudgeOverlay.hidden = false;
  }
  function closeNudge(){ nudgeOverlay.hidden = true; }
  function doDownload(){
    setPopupStatus("Building PDF…");
    popupDownloadBtn.disabled = true;
    setTimeout(function(){
      var doc;
      try{ doc = exportPDF(); }
      catch(err){ console.error(err); setPopupStatus("Something went wrong building the PDF.", true); popupDownloadBtn.disabled=false; return; }
      if(!doc){ popupDownloadBtn.disabled=false; return; }
      try{ doc.save(safeName()); }
      catch(err){ console.error(err); setPopupStatus("Couldn't save the PDF.", true); popupDownloadBtn.disabled=false; return; }
      setPopupStatus("Downloaded ✓");
      popupDownloadBtn.disabled=false;
      bumpCounter();
    }, 30);
  }
  exportBtns.forEach(function(b){ b.addEventListener("click", openExportPopup); });
  popupDownloadBtn.addEventListener("click", doDownload);
  nudgeClose.addEventListener("click", closeNudge);
  nudgeOverlay.addEventListener("click", function(e){ if(e.target===nudgeOverlay) closeNudge(); });
  document.addEventListener("keydown", function(e){ if(e.key==="Escape" && !nudgeOverlay.hidden) closeNudge(); });

  function clearAll(){
    if(!confirm("Clear all fields? This erases everything you've entered and can't be undone.")) return;
    state = defaultState();
    renderForm(); renderPreview(); setStatus("");
  }
  document.getElementById("clearBtn").addEventListener("click", clearAll);

  window.addEventListener("resize", function(){
    var tas = formBody.querySelectorAll("textarea"); for(var i=0;i<tas.length;i++) autoGrow(tas[i]);
  });

  document.addEventListener("click", function(e){
    document.querySelectorAll(".tel.open, .combo.open").forEach(function(open){
      if(!open.contains(e.target)){
        open.classList.remove("open");
        var p = open.querySelector(".tel-pop"); if(p) p.classList.remove("open");
      }
    });
  });

  var burgerBtn = document.getElementById("burgerBtn");
  var drawerOverlay = document.getElementById("drawerOverlay");
  var drawerClose = document.getElementById("drawerClose");
  function openDrawer(){ drawerOverlay.hidden=false; void drawerOverlay.offsetWidth; drawerOverlay.classList.add("open"); document.body.style.overflow="hidden"; }
  function closeDrawer(){ drawerOverlay.classList.remove("open"); document.body.style.overflow=""; setTimeout(function(){ drawerOverlay.hidden=true; }, 260); }
  burgerBtn.addEventListener("click", openDrawer);
  drawerClose.addEventListener("click", closeDrawer);
  drawerOverlay.addEventListener("click", function(e){ if(e.target===drawerOverlay) closeDrawer(); });
  document.addEventListener("keydown", function(e){ if(e.key==="Escape" && !drawerOverlay.hidden) closeDrawer(); });

  renderForm();
  renderPreview();
  readCounter();
})();
</script>
